openapi: 3.0.3
info:
  title: Clinical FHIR Assistant API
  description: |
    A clinical assistant API for healthcare organizations. Supports two interaction modes:

    1. **Prompt API** (/v1/prompt): Standard chat endpoint for web app clients. Client POSTs
       a JSON body with a `prompt` field and an optional `conversationId`. If a `conversationId`
       is provided, the server will use the stored conversation history as context for the request.
       If omitted, a new conversation will be created and the generated `conversationId` will be
       returned in the response. An optional `modelRequested` field allows the client to request
       a specific LLM model. The actual model used is returned in the response as `modelUsed`.

    2. **A2A API** (/v1/message:send): A2A protocol compliant endpoint for agent-to-agent
       interoperability. Accepts A2A HTTP+JSON transport envelopes per the A2A specification.
       The agent card url is the base URL and the inspector appends /v1/message:send automatically.

    Three well-known endpoints expose the A2A agent card for discovery:
    - /.well-known/agent-card.json
    - /.well-known/agent.json
    - /.well-known/agent-card
  version: 1.0.0
paths:
  /.well-known/agent-card.json:
    get:
      summary: Get A2A Agent Card
      operationId: getAgentCardJson
      description: |
        Returns the A2A protocol agent card describing this agent's capabilities,
        skills, and auth requirements. No authentication required.
      security: []
      responses:
        "200":
          description: A2A agent card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentCard"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /.well-known/agent.json:
    get:
      summary: Get A2A Agent Card (alternate path)
      operationId: getAgentJson
      description: |
        Returns the A2A protocol agent card describing this agent's capabilities,
        skills, and auth requirements. No authentication required.
      security: []
      responses:
        "200":
          description: A2A agent card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentCard"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /.well-known/agent-card:
    get:
      summary: Get A2A Agent Card (no extension)
      operationId: getAgentCard
      description: |
        Returns the A2A protocol agent card describing this agent's capabilities,
        skills, and auth requirements. No authentication required.
        This path is used by the A2A Inspector and other tools that fetch the
        agent card without a file extension.
      security: []
      responses:
        "200":
          description: A2A agent card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentCard"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/prompt:
    post:
      summary: Submit a prompt and receive a response
      operationId: prompt
      description: |
        Standard chat endpoint for web app clients. Accepts a natural language prompt
        and optional conversation ID for multi-turn context. Returns the assistant reply,
        conversation ID, and model used.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
              - prompt
              type: object
              properties:
                prompt:
                  minLength: 1
                  type: string
                  description: The prompt to send to the LLM.
                conversationId:
                  type: string
                  description: |
                    Optional. The unique identifier of an existing conversation.
                    If provided, the full conversation history will be used as context.
                    If omitted, a new conversation will be created.
                modelRequested:
                  type: string
                  description: |
                    Optional. The model to use for this request (e.g. "gpt-4o", "claude-haiku-4-5").
                    If omitted or if the requested model is unavailable, the server
                    will use its default model.
              additionalProperties: false
            example:
              prompt: Find patient John Smith
              conversationId: "abc-123"
              modelRequested: "claude-haiku-4-5"
      responses:
        "200":
          description: Successful response from the LLM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptResponse"
              example:
                message: "Here are the results for John Smith..."
                conversationId: "abc-123"
                modelUsed: "claude-haiku-4-5"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/message:send:
    post:
      summary: A2A protocol compliant message endpoint
      operationId: a2aMessageSend
      description: |
        A2A protocol compliant endpoint using the A2A HTTP+JSON transport format.
        The inspector sends the message object directly at the top level with
        transport and method fields. Bearer token must be included in the
        Authorization header.
        Role values use A2A enum constants: ROLE_USER for requests, ROLE_AGENT
        for responses. Content parts use field presence to determine type:
        use text field for text responses, file for file responses, data for
        structured data responses. Do not include a kind field in content parts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/A2ARequest"
            example:
              transport: "HTTP+JSON"
              method: "message/send"
              message:
                messageId: "msg-1780870283574-5s01k0owy"
                role: "ROLE_USER"
                metadata: {}
                content:
                  - text: "Find patient John Smith"
      responses:
        "200":
          description: Successful A2A response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/A2AResponse"
              example:
                message:
                  messageId: "msg-response-001"
                  role: "ROLE_AGENT"
                  contextId: "abc-123"
                  content:
                    - text: "Here are the results for John Smith..."
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/A2AError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/A2AError"

components:
  schemas:
    AgentCard:
      type: object
      required:
        - name
        - description
        - url
        - version
        - protocolVersion
        - preferredTransport
        - defaultInputModes
        - defaultOutputModes
        - capabilities
        - skills
      properties:
        name:
          type: string
        description:
          type: string
        url:
          type: string
        version:
          type: string
        protocolVersion:
          type: string
        preferredTransport:
          type: string
        defaultInputModes:
          type: array
          items:
            type: string
        defaultOutputModes:
          type: array
          items:
            type: string
        provider:
          type: object
          properties:
            organization:
              type: string
            url:
              type: string
        capabilities:
          type: object
          properties:
            streaming:
              type: boolean
            pushNotifications:
              type: boolean
            stateTransitionHistory:
              type: boolean
        authentication:
          type: object
          properties:
            schemes:
              type: array
              items:
                type: string
            description:
              type: string
        skills:
          type: array
          items:
            type: object
            required:
              - id
              - name
              - description
            properties:
              id:
                type: string
              name:
                type: string
              description:
                type: string
              tags:
                type: array
                items:
                  type: string
              examples:
                type: array
                items:
                  type: string

    A2ARequest:
      type: object
      required:
        - transport
        - method
        - message
      properties:
        transport:
          type: string
          description: Transport protocol identifier e.g. HTTP+JSON
        method:
          type: string
          description: A2A method to invoke e.g. message/send
        message:
          type: object
          required:
            - messageId
            - role
            - content
          properties:
            messageId:
              type: string
              description: Unique identifier for this request message
            role:
              type: string
              description: Sender role e.g. ROLE_USER
            contextId:
              type: string
              description: Optional context ID for multi-turn conversation continuity.
                Maps to conversationId internally.
            taskId:
              type: string
              description: Optional task ID if associated with an existing task
            metadata:
              type: object
              additionalProperties: true
              description: Optional metadata
            content:
              type: array
              description: |
                Message content parts. Type is determined by field presence:
                use text for plain text, file for file content, data for
                structured data. Do not include a kind field.
              items:
                type: object
                properties:
                  text:
                    type: string
                    description: Plain text content
                  file:
                    type: object
                    description: File content
                    additionalProperties: true
                  data:
                    type: object
                    description: Structured data content
                    additionalProperties: true
                  metadata:
                    type: object
                    additionalProperties: true
                    description: Optional part-level metadata

    A2AResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: object
          required:
            - messageId
            - role
            - content
          properties:
            messageId:
              type: string
              description: Unique identifier for this response message
            role:
              type: string
              description: Sender role e.g. ROLE_AGENT
            contextId:
              type: string
              description: Context ID for use in subsequent requests.
                Maps to conversationId internally.
            taskId:
              type: string
              description: Optional task ID if associated with a task
            metadata:
              type: object
              additionalProperties: true
              description: Optional metadata
            extensions:
              type: array
              items:
                type: string
              description: Optional extension URIs
            content:
              type: array
              description: |
                Response content parts. Type is determined by field presence:
                use text for plain text, file for file content, data for
                structured data. Do not include a kind field.
              items:
                type: object
                properties:
                  text:
                    type: string
                    description: Plain text content
                  file:
                    type: object
                    description: File content
                    additionalProperties: true
                  data:
                    type: object
                    description: Structured data content
                    additionalProperties: true
                  metadata:
                    type: object
                    additionalProperties: true
                    description: Optional part-level metadata

    A2AError:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: integer
              description: Error code
            message:
              type: string
              description: Human readable error description

    PromptResponse:
      required:
      - message
      - conversationId
      - modelUsed
      type: object
      properties:
        message:
          type: string
        conversationId:
          type: string
        modelUsed:
          type: string
      additionalProperties: false

    Error:
      required:
      - message
      type: object
      properties:
        message:
          type: string
      additionalProperties: false