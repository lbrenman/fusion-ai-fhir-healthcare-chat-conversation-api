openapi: 3.0.3
info:
  title: Prompt API
  description: |
    Client POSTs a JSON body with a `prompt` field and an optional `conversationId`.
    If a `conversationId` is provided, the server will use the stored conversation
    history as context for the request. If omitted, a new conversation will be
    created and the generated `conversationId` will be returned in the response.
    An optional `modelRequested` field allows the client to request a specific LLM
    model. The actual model used is returned in the response as `modelUsed`.
    Server responds with a JSON object containing the assistant reply, the conversationId,
    and the model used.
  version: 1.0.0
paths:
  /.well-known/agent-card.json:
    get:
      summary: Get A2A Agent Card
      operationId: getAgentCardJson
      description: |
        Returns the A2A protocol agent card describing this agent's capabilities,
        skills, and auth requirements. No authentication required.
      security: []
      responses:
        "200":
          description: A2A agent card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentCard"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /.well-known/agent.json:
    get:
      summary: Get A2A Agent Card (alternate path)
      operationId: getAgentJson
      description: |
        Returns the A2A protocol agent card describing this agent's capabilities,
        skills, and auth requirements. No authentication required.
      security: []
      responses:
        "200":
          description: A2A agent card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentCard"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /.well-known/agent-card:
    get:
      summary: Get A2A Agent Card (no extension)
      operationId: getAgentCard
      description: |
        Returns the A2A protocol agent card describing this agent's capabilities,
        skills, and auth requirements. No authentication required.
        This path is used by the A2A Inspector and other tools that fetch the
        agent card without a file extension.
      security: []
      responses:
        "200":
          description: A2A agent card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentCard"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/prompt:
    post:
      summary: Submit a prompt and receive a response
      operationId: prompt
      requestBody:
        content:
          application/json:
            schema:
              required:
              - prompt
              type: object
              properties:
                prompt:
                  minLength: 1
                  type: string
                  description: The prompt to send to the LLM.
                conversationId:
                  type: string
                  description: |
                    Optional. The unique identifier of an existing conversation.
                    If provided, the full conversation history will be used as context.
                    If omitted, a new conversation will be created.
                modelRequested:
                  type: string
                  description: |
                    Optional. The model to use for this request (e.g. "gpt-4o", "claude-sonnet-4-6").
                    If omitted or if the requested model is unavailable, the server
                    will use its default model.
              additionalProperties: false
            example:
              prompt: What is my name?
              conversationId: "abc-123"
              modelRequested: "gpt-4o"
        required: true
      responses:
        "200":
          description: Successful response from the LLM
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptResponse"
              example:
                message: "Your name is Leor."
                conversationId: "abc-123"
                modelUsed: "gpt-4o"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    AgentCard:
      type: object
      required:
        - name
        - description
        - url
        - version
        - protocolVersion
        - preferredTransport
        - defaultInputModes
        - defaultOutputModes
        - capabilities
        - skills
      properties:
        name:
          type: string
          description: Human-readable name of the agent.
        description:
          type: string
          description: Brief description of what the agent does.
        url:
          type: string
          description: Base URL of the agent's API endpoint.
        version:
          type: string
          description: Version of this agent.
        protocolVersion:
          type: string
          description: A2A protocol version in semver format.
          example: "0.3.0"
        preferredTransport:
          type: string
          description: Preferred transport protocol.
          enum: ["JSONRPC", "GRPC", "HTTP+JSON"]
          example: "HTTP+JSON"
        defaultInputModes:
          type: array
          description: Default input modes supported by the agent.
          items:
            type: string
          example: ["text"]
        defaultOutputModes:
          type: array
          description: Default output modes supported by the agent.
          items:
            type: string
          example: ["text"]
        provider:
          type: object
          properties:
            organization:
              type: string
            url:
              type: string
        capabilities:
          type: object
          properties:
            streaming:
              type: boolean
            pushNotifications:
              type: boolean
            stateTransitionHistory:
              type: boolean
        authentication:
          type: object
          properties:
            schemes:
              type: array
              items:
                type: string
            description:
              type: string
        skills:
          type: array
          items:
            type: object
            required:
              - id
              - name
              - description
            properties:
              id:
                type: string
              name:
                type: string
              description:
                type: string
              tags:
                type: array
                items:
                  type: string
              examples:
                type: array
                items:
                  type: string

    PromptResponse:
      required:
      - message
      - conversationId
      - modelUsed
      type: object
      properties:
        message:
          type: string
          description: The assistant's reply.
        conversationId:
          type: string
          description: |
            The conversation identifier. Use this in subsequent requests
            to maintain conversation context.
        modelUsed:
          type: string
          description: |
            The model that was actually used to generate the response.
            May differ from modelRequested if the requested model was
            unavailable or not recognized.
      additionalProperties: false

    Error:
      required:
      - message
      type: object
      properties:
        message:
          type: string
      additionalProperties: false